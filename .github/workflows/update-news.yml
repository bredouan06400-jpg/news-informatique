name: MAJ automatique des news

on:
  schedule:
    # Tous les 3 jours à 7h00 UTC (= 9h00 heure de Paris en été)
    - cron: '0 7 */3 * *'
  workflow_dispatch: {}   # permet aussi un lancement manuel depuis GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collecter les news et régénérer le site
        run: python scripts/update_news.py

      - name: Publier si changements
        run: |
          git config user.name "news-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Aucune nouveauté : rien à publier."
          else
            git add -A
            git commit -m "MAJ auto des news ($(date -u +%F))"
            git push
          fi
